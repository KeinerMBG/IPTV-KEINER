<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Vision • PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#000000">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=SF+Pro+Display:wght@400;500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .channel-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .channel-card:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        .video-container {
            position: relative;
            overflow: hidden;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        
        .overlay {
            transition: opacity 0.3s ease;
        }
        
        .list-item {
            transition: all 0.2s ease;
        }
        
        .list-item.active {
            background: rgba(255,255,255,0.1);
            border-left: 4px solid #3b82f6;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div id="sidebar" class="w-80 border-r border-zinc-800 bg-zinc-950 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center text-xl font-bold">📺</div>
                    <div>
                        <h1 class="text-2xl font-semibold tracking-tight">IPTV Vision</h1>
                        <p class="text-xs text-zinc-500">Modern Player</p>
                    </div>
                </div>
            </div>
            
            <!-- Search -->
            <div class="p-4">
                <div class="relative">
                    <input id="search-input" 
                           type="text" 
                           placeholder="Buscar canales..." 
                           class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl py-3 px-5 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                    <button onclick="toggleSearch()" class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-400">🔍</button>
                </div>
            </div>
            
            <!-- Tabs -->
            <div class="flex border-b border-zinc-800 px-4">
                <button onclick="switchTab(0)" id="tab-0" class="tab-button flex-1 py-4 text-sm font-medium border-b-2 border-blue-500 text-blue-400">Canales</button>
                <button onclick="switchTab(1)" id="tab-1" class="tab-button flex-1 py-4 text-sm font-medium text-zinc-400">EPG</button>
                <button onclick="switchTab(2)" id="tab-2" class="tab-button flex-1 py-4 text-sm font-medium text-zinc-400">Favoritos</button>
            </div>
            
            <!-- Channel List -->
            <div id="channels-list" class="flex-1 overflow-auto p-3 space-y-1">
                <!-- Populated by JS -->
            </div>
        </div>
        
        <!-- Main Video Area -->
        <div class="flex-1 flex flex-col">
            <!-- Top Bar -->
            <div class="h-14 border-b border-zinc-800 bg-zinc-950/80 backdrop-blur-xl flex items-center px-6 justify-between z-10">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-zinc-900 rounded-2xl">☰</button>
                    <div id="current-channel" class="font-medium">Selecciona un canal</div>
                </div>
                
                <div class="flex items-center gap-6 text-sm">
                    <button onclick="loadPlaylist()" class="flex items-center gap-2 hover:text-blue-400 transition-colors">
                        <span class="text-lg">📂</span> Cargar M3U
                    </button>
                    <button onclick="showSettings()" class="flex items-center gap-1.5 px-4 py-1.5 rounded-3xl hover:bg-zinc-900 transition-colors">
                        ⚙️ Ajustes
                    </button>
                </div>
            </div>
            
            <!-- Video Player -->
            <div class="flex-1 video-container flex items-center justify-center bg-black relative" id="video-wrapper">
                <video id="video-player" class="max-h-full max-w-full" controls></video>
                
                <!-- Custom Overlay Controls (iOS style) -->
                <div id="player-overlay" class="overlay absolute inset-0 flex flex-col justify-end bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 hover:opacity-100 transition-opacity">
                    <div class="p-6 space-y-4">
                        <!-- Progress -->
                        <div class="flex items-center gap-3 text-xs">
                            <span id="current-time" class="tabular-nums w-12">00:00</span>
                            <div class="flex-1 h-1 bg-white/30 rounded-full overflow-hidden">
                                <div id="progress-bar" class="h-full w-0 bg-blue-500 rounded-full transition-all"></div>
                            </div>
                            <span id="duration" class="tabular-nums w-12">00:00</span>
                        </div>
                        
                        <!-- Bottom Controls -->
                        <div class="flex justify-between items-center">
                            <div class="flex gap-6">
                                <button onclick="togglePlay()" id="play-btn" class="text-4xl hover:scale-110 transition-transform">▶️</button>
                                <button onclick="toggleMute()" class="text-3xl">🔊</button>
                            </div>
                            
                            <div class="flex gap-4 text-2xl">
                                <button onclick="toggleFullscreen()" class="hover:scale-110 transition-transform">⛶</button>
                                <button onclick="togglePictureInPicture()" class="hover:scale-110 transition-transform">📺</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Info Bar -->
            <div id="info-bar" class="h-20 bg-zinc-900 border-t border-zinc-800 p-4 flex items-center justify-between text-sm hidden">
                <div>
                    <div id="channel-name" class="font-semibold"></div>
                    <div id="program-info" class="text-zinc-400 text-xs"></div>
                </div>
                <div class="flex items-center gap-2 text-xs bg-zinc-800 px-4 py-1 rounded-3xl">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    EN VIVO
                </div>
            </div>
        </div>
        
        <!-- Right Panel (EPG / Details) -->
        <div id="right-panel" class="w-96 border-l border-zinc-800 bg-zinc-950 hidden lg:flex flex-col">
            <div class="p-5 border-b border-zinc-800">
                <h3 class="uppercase text-xs tracking-widest text-zinc-500 mb-3">Ahora en antena</h3>
                <div id="epg-now" class="space-y-3">
                    <!-- Dynamic -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modals -->
    <!-- Playlist Load Modal -->
    <div id="playlist-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="glass rounded-3xl p-8 w-full max-w-md mx-4">
            <h2 class="text-2xl font-semibold mb-6">Cargar Lista IPTV</h2>
            <input id="m3u-url" type="text" placeholder="https://ejemplo.com/playlist.m3u" 
                   class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-4 text-sm mb-4">
            <div class="flex gap-3">
                <button onclick="hideModal()" 
                        class="flex-1 py-4 rounded-3xl border border-zinc-700 hover:bg-zinc-900">Cancelar</button>
                <button onclick="loadM3UFromURL()" 
                        class="flex-1 py-4 bg-blue-600 rounded-3xl hover:bg-blue-700">Cargar</button>
            </div>
            <div class="text-xs text-center text-zinc-500 mt-6">
                o arrastra un archivo .m3u
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
